# Render blueprint: thin web service (health + chat) + ONE nightly cron.
# The nightly job reconciles today's adherence AND plans tomorrow; same-day
# changes come through the chat interface (docs/chat.md), so no morning cron.
# CRON SCHEDULE IS UTC — adjust if APP_TIMEZONE changes.
# 21:00 America/New_York = 01:00/02:00 UTC depending on DST; 02:00 UTC chosen.
services:
  - type: web
    name: jim-web
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn jim.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: jim-secrets

  - type: cron
    name: jim-nightly
    runtime: python
    schedule: "0 2 * * *"   # ~21:00 America/New_York
    buildCommand: pip install -e .
    startCommand: python -m jim.jobs.nightly
    envVars:
      - fromGroup: jim-secrets

envVarGroups:
  - name: jim-secrets
    envVars:
      - key: GARMIN_EMAIL
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_KNEE_LOG_DB_ID
        sync: false
      - key: NOTION_TASKS_DB_ID
        sync: false
      - key: NOTION_PROPOSAL_DB_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_TIMEZONE
        value: America/New_York
      - key: CHAT_SECRET
        sync: false
